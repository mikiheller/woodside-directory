<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1e">
  <title>Woodside Directory</title>
  <link rel="stylesheet" href="style.css?v=3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>Woodside Directory</h1>
      <a href="https://docs.google.com/spreadsheets/d/1D6MzGtBFOPTx6zjtFingE1CHmmVhGfl1OAmQoedXXMg/edit?usp=sharing"
         target="_blank" rel="noopener" class="sheet-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        <span>Open Google Sheet</span>
      </a>
    </div>
  </header>

  <main>
    <div class="search-container">
      <div class="search-box">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search names, addresses..." autocomplete="off">
        <button id="clear-search" class="clear-btn" title="Clear search">&times;</button>
      </div>
    </div>

    <div class="controls">
      <div class="grade-filters" id="grade-filters">
        <button class="grade-btn active" data-grade="all">All</button>
      </div>
      <div class="controls-right">
        <button id="reset-btn" class="reset-btn hidden" title="Reset all filters">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Reset
        </button>
        <button id="copy-emails-btn" class="copy-emails-btn hidden" title="Copy all parent emails for current view">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy Emails
        </button>
        <div class="view-toggle">
          <button class="view-btn active" data-view="cards" title="Card view">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" data-view="table" title="Spreadsheet view">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="results-info" id="results-info"></div>

    <div id="directory" class="directory cards-view"></div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading directory...</p>
    </div>

    <div id="error" class="error hidden">
      <div class="error-icon">!</div>
      <h2>Couldn't load the directory</h2>
      <p>Make sure the Google Sheet is shared as "Anyone with the link" can view.</p>
      <button onclick="location.reload()" class="retry-btn">Try Again</button>
    </div>
  </main>

  <div id="modal-backdrop" class="modal-backdrop"></div>
  <div id="family-modal" class="family-modal"></div>

  <script src="app.js"></script>
</body>
</html>
